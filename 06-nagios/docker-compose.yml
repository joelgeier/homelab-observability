version: "3.9"

# -----------------------------------------------------------------------------
# Project: homelab-observability
# Stack: nagios-core
# File: docker-compose.yml
# Version: 0.2.1
#
# CHANGELOG:
# - 0.2.1: Switched to shared external network "observability"
#          Removed per-stack network definition
#
# DESIGN PRINCIPLE:
# - Use a single shared Docker network across observability stack components
# - Enables future integration (Traefik, cross-service communication)
# - Avoid unnecessary network sprawl in homelab environment
# -----------------------------------------------------------------------------
# DESIGN PRINCIPLE: STACK ISOLATION
#
# This stack is intentionally self-contained.
# No external visualization or telemetry systems (e.g. Grafana, Prometheus)
# are included at this stage.
#
# Goal:
#   - Validate Nagios as a standalone "state engine"
#   - Reduce complexity during initial deployment and troubleshooting
#
# Future Phase:
#   - Cross-stack integration (Grafana dashboards, alert correlation, etc.)
# -----------------------------------------------------------------------------
# -----------------------------------------------------------------------------

services:
  nagios:
    image: tronyx/nagios:latest
    container_name: nagios-core

    # -------------------------------------------------------------------------
    # PORT CONFIGURATION (INITIAL ACCESS ONLY)
    # -------------------------------------------------------------------------
    ports:
      - "8095:80"   # Access via: http://<labhost-ip>:8095

    # -------------------------------------------------------------------------
    # ENVIRONMENT VARIABLES
    # -------------------------------------------------------------------------
    environment:
      - TZ=${TZ:-UTC}

    # -------------------------------------------------------------------------
    # VOLUMES (PERSISTENCE)
    # -------------------------------------------------------------------------
    volumes:
      - nagios_config:/opt/nagios/etc
      - nagios_var:/opt/nagios/var
      - nagios_plugins:/opt/nagios/libexec
      - nagios_graph:/opt/nagiosgraph/var

    # -------------------------------------------------------------------------
    # RESTART POLICY
    # -------------------------------------------------------------------------
    restart: unless-stopped

    # -------------------------------------------------------------------------
    # NETWORKING
    # -------------------------------------------------------------------------
    networks:
      - observability

    # -------------------------------------------------------------------------
    # OPTIONAL SETTINGS (UNCOMMENT AS NEEDED)
    # -------------------------------------------------------------------------

    # tty: true

    # ulimits:
    #   nofile:
    #     soft: 65536
    #     hard: 65536

    # deploy:
    #   resources:
    #     limits:
    #       cpus: "1.0"
    #       memory: 512M

# -----------------------------------------------------------------------------
# NETWORKS
# -----------------------------------------------------------------------------
networks:
  observability:
    external: true
    name: observability

# -----------------------------------------------------------------------------
# VOLUMES
# -----------------------------------------------------------------------------
volumes:
  nagios_config:
  nagios_var:
  nagios_plugins:
  nagios_graph
