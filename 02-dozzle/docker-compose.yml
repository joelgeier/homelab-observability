# ============================================================================
# Dozzle - Real-time Docker Container Log Viewer
# ============================================================================
# Version:       1.0.1
# Last Updated:  2026-04-09
# Purpose:       Monitor logs from all containers in homelab-observability stack
# Web UI:        http://labhost00.taild6529.ts.net:8888
# Data Location: None (stateless - reads directly from Docker socket)
# Dependencies:  Docker daemon
# Documentation: https://dozzle.dev/guide/what-is-dozzle
# ============================================================================
# Changelog:
# 1.0.1 (2026-04-09) - Health check fix
#   - Removed health check (wget not available in Dozzle image)
#   - Container status still monitored by Docker
# 1.0.0 (2026-04-09) - Initial deployment
#   - Dozzle v8.10.2
#   - Read-only Docker socket mount
#   - Port 8888 (avoids 8080 conflicts)
#   - Authentication disabled (Tailscale network only)
# ============================================================================
# Security Notes:
# - Docker socket is mounted READ-ONLY (cannot start/stop containers)
# - No built-in authentication in this config (Tailscale network provides access control)
# - Consider enabling DOZZLE auth or adding Traefik + Authentik during security hardening
# ============================================================================

services:
  dozzle:
    # ── Image Configuration ───────────────────────────────────────
    image: amir20/dozzle:v8.10.2  # Pinned version - update periodically
    container_name: dozzle
    restart: unless-stopped
    
    # ── Port Mapping ──────────────────────────────────────────────
    ports:
      - "8888:8080"  # Web UI - real-time log viewer (8888 avoids 8080 conflicts)
    
    # ── Volume Mounts ─────────────────────────────────────────────
    volumes:
      # Read-only Docker socket - Dozzle can ONLY read logs, not modify containers
      - /var/run/docker.sock:/var/run/docker.sock:ro
    
    # ── Environment Variables ─────────────────────────────────────
    environment:
      - TZ=${TZ:-UTC}
      
      # Optional: Enable Dozzle's built-in authentication
      # Uncomment these and add to .env file:
      # - DOZZLE_USERNAME=${DOZZLE_USERNAME}
      # - DOZZLE_PASSWORD=${DOZZLE_PASSWORD}
      # - DOZZLE_KEY=${DOZZLE_KEY}  # Secret key for session encryption
      
      # Optional: Filter visible containers
      # Examples:
      # - DOZZLE_FILTER=status=running           # Only show running containers
      # - DOZZLE_FILTER=name=observability-*     # Only show observability stack
      # - DOZZLE_FILTER=label=monitoring=true    # Only containers with this label
    
    # ── Network Configuration ─────────────────────────────────────
    # Using default bridge network - no custom network needed
    # Dozzle only needs access to Docker socket, not other containers
    
    # ── Future: Traefik Integration ───────────────────────────────
    # Uncomment when adding reverse proxy:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.dozzle.rule=Host(`logs.labhost00.jg-labs.dev`)"
    #   - "traefik.http.routers.dozzle.entrypoints=websecure"
    #   - "traefik.http.routers.dozzle.tls=true"
    #   - "traefik.http.services.dozzle.loadbalancer.server.port=8888"
    #   # Add Authentik forward auth:
    #   - "traefik.http.routers.dozzle.middlewares=authentik@docker"

# ============================================================================
# Deployment Instructions:
# ============================================================================
# 1. Ensure Docker is running: docker ps
# 2. Deploy: docker-compose up -d
# 3. Verify: docker-compose ps
# 4. Access: http://labhost00.taild6529.ts.net:8888
# 5. Check logs: docker-compose logs -f dozzle
#
# To update to latest version:
# 1. Check for updates: https://github.com/amir20/dozzle/releases
# 2. Update image tag above
# 3. Pull new image: docker-compose pull
# 4. Recreate container: docker-compose up -d
# ============================================================================
