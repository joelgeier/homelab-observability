# ============================================================================
# Wazuh Stack - Docker Compose Configuration
# ============================================================================
# Project:       homelab-observability
# Component:     08-wazuh (Security Monitoring & SIEM)
# Version:       1.4.0
# Description:   Single-node Wazuh deployment - OFFICIAL PATTERN
# Documentation: Based on https://github.com/wazuh/wazuh-docker/tree/master/single-node
#
# CRITICAL CHANGES FROM PREVIOUS VERSIONS:
#   - Upgraded to Wazuh 5.0.0 (matches cert generator 0.0.4)
#   - Fixed certificate paths to match official deployment
#   - Using proper environment variables (WAZUH_INDEXER_HOSTS vs INDEXER_URL)
#   - All 8 volumes following official naming
#
# Changelog:
#   v1.4.0 (2026-04-12) - Wazuh 5.0.0, official paths, proper cert compatibility
#   v1.3.2 (2026-04-12) - Hostname alignment (wazuh.indexer vs wazuh-indexer)
#   v1.3.0 (2026-04-11) - Initial working indexer with /usr/share certs
#   v1.0.0 (2026-04-09) - Initial version (4.11.2 - incompatible)
# ============================================================================

version: '3.8'

# ── Networks ─────────────────────────────────────────────────────────────
networks:
  observability:
    external: true

# ── Services ─────────────────────────────────────────────────────────────
services:

 # ── Wazuh Manager (Security Engine) ────────────────────────────────────
  wazuh-manager:
    image: wazuh/wazuh-manager:4.14.4
    container_name: wazuh.manager
    hostname: wazuh.manager
    restart: always
    
    # ── Dependencies ─────────────────────────────────────────────────────
    depends_on:
      wazuh-indexer:
        condition: service_healthy
    
    # ── Health Check ─────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD-SHELL", "curl -k -s -o /dev/null https://localhost:55000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    
    # ── Resource Limits ──────────────────────────────────────────────────
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    
    # ── Port Mapping ─────────────────────────────────────────────────────
    ports:
      - "1514:1514"    # Agent enrollment (TCP)
      - "1515:1515"    # Agent enrollment (TCP - alternative)
      - "514:514/udp"  # Syslog (UDP)
      - "55000:55000"  # API for registration/management
    
    # ── Environment ──────────────────────────────────────────────────────
    # CRITICAL: Use WAZUH_INDEXER_HOSTS not INDEXER_URL (5.0.0 change)
    environment:
      - WAZUH_INDEXER_HOSTS=wazuh.indexer:9200
      - WAZUH_NODE_NAME=manager
      - WAZUH_CLUSTER_NODES=wazuh.manager
      - WAZUH_CLUSTER_BIND_ADDR=wazuh.manager
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=admin
    
    # ── Volumes ──────────────────────────────────────────────────────────
    # CRITICAL: Certificate paths MUST match official deployment
    volumes:
      # Data persistence - Official volume names
      - wazuh_api_configuration:/var/wazuh-manager/api/configuration
      - wazuh_etc:/var/wazuh-manager/etc
      - wazuh_logs:/var/wazuh-manager/logs
      - wazuh_queue:/var/wazuh-manager/queue
      - wazuh_var_multigroups:/var/wazuh-manager/var/multigroups
      
      # SSL certificates - OFFICIAL PATHS
      - ./config/wazuh_manager/certs/root-ca.pem:/var/wazuh-manager/etc/certs/root-ca.pem
      - ./config/wazuh_manager/certs/wazuh.manager.pem:/var/wazuh-manager/etc/certs/manager.pem
      - ./config/wazuh_manager/certs/wazuh.manager-key.pem:/var/wazuh-manager/etc/certs/manager-key.pem
    
    networks:
      - observability

  # ── Wazuh Indexer (OpenSearch - Data Storage) ─────────────────────────
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.14.4
    container_name: wazuh.indexer
    hostname: wazuh.indexer
    restart: always
    
    # ── Port Mapping ─────────────────────────────────────────────────────
    ports:
      - "9200:9200"
    
    # ── Environment ──────────────────────────────────────────────────────
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - bootstrap.memory_lock=true
      - network.host=0.0.0.0
      - node.name=wazuh.indexer
      - cluster.initial_cluster_manager_nodes=wazuh.indexer
      - node.max_local_storage_nodes=1
      - plugins.security.allow_default_init_securityindex=true
      - NODES_DN=CN=wazuh.indexer,OU=Wazuh,O=Wazuh,L=California,C=US
    
    # ── Resource Limits ──────────────────────────────────────────────────
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    
    # ── Health Check ─────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD-SHELL", "curl -fks https://localhost:9200/_plugins/_security/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    
    # ── Volumes ──────────────────────────────────────────────────────────
    # CRITICAL: Certificate paths MUST match official deployment
    volumes:
      # Data persistence
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      
      # SSL certificates - OFFICIAL PATHS
      - ./config/wazuh_indexer/certs/root-ca.pem:/usr/share/wazuh-indexer/config/certs/root-ca.pem
      - ./config/wazuh_indexer/certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/config/certs/indexer-key.pem
      - ./config/wazuh_indexer/certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/config/certs/indexer.pem
      - ./config/wazuh_indexer/certs/admin.pem:/usr/share/wazuh-indexer/config/certs/admin.pem
      - ./config/wazuh_indexer/certs/admin-key.pem:/usr/share/wazuh-indexer/config/certs/admin-key.pem
    
    networks:
      - observability

 
  # ── Wazuh Dashboard (Web UI) ───────────────────────────────────────────
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.14.4
    container_name: wazuh.dashboard
    hostname: wazuh.dashboard
    restart: always
    
    # ── Dependencies ─────────────────────────────────────────────────────
    depends_on:
      wazuh-indexer:
        condition: service_healthy
      wazuh-manager:
        condition: service_healthy
    
    # ── Health Check ─────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "curl", "-k", "-s", "-o", "/dev/null", "https://localhost:5601/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # ── Port Mapping ─────────────────────────────────────────────────────
    ports:
      - "8443:5601"  # HTTPS Web UI (remapped to avoid port 443 conflict)
    
    # ── Environment ──────────────────────────────────────────────────────
    environment:
      - SERVER_PORT=5601
      - SERVER_HOST=0.0.0.0
      - OPENSEARCH_HOSTS=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=admin
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - SERVER_SSL_CERTIFICATE=/usr/share/wazuh-dashboard/config/certs/dashboard.pem
      - SERVER_SSL_KEY=/usr/share/wazuh-dashboard/config/certs/dashboard-key.pem
      - OPENSEARCH_SSL_CERTIFICATE_AUTHORITIES=/usr/share/wazuh-dashboard/config/certs/root-ca.pem
    
    # ── Volumes ──────────────────────────────────────────────────────────
    # CRITICAL: Certificate paths MUST match official deployment
    volumes:
      # Configuration persistence - Official volume names
      #-  wazuh-dashboard-config:/usr/share/wazuh-dashboard/config
      - wazuh-dashboard-custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
      
      # SSL certificates - OFFICIAL PATHS
      - ./config/wazuh_dashboard/certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/config/certs/dashboard.pem
      - ./config/wazuh_dashboard/certs/wazuh.dashboard-key.pem:/usr/share/wazuh-dashboard/config/certs/dashboard-key.pem
      - ./config/wazuh_dashboard/certs/root-ca.pem:/usr/share/wazuh-dashboard/config/certs/root-ca.pem
    
    networks:
      - observability

# ── Named Volumes (Docker-Managed) ──────────────────────────────────────
# NOTE: These can be converted to bind mounts later for easier backups
#       Example: wazuh-indexer-data -> ./data/indexer
#                wazuh_logs -> ./data/logs
volumes:
  # Manager volumes (5)
  wazuh_api_configuration:
    name: wazuh_api_configuration
  wazuh_etc:
    name: wazuh_etc
  wazuh_logs:
    name: wazuh_logs
  wazuh_queue:
    name: wazuh_queue
  wazuh_var_multigroups:
    name: wazuh_var_multigroups
  
  # Indexer volumes (1)
  wazuh-indexer-data:
    name: wazuh-indexer-data
  
  # Dashboard volumes (2)
  wazuh-dashboard-config:
    name: wazuh-dashboard-config
  wazuh-dashboard-custom:
    name: wazuh-dashboard-custom
